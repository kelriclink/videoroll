x-application-build: &application-build
  context: .
  dockerfile: Dockerfile
  args:
    INSTALL_ASR: ${INSTALL_ASR:-1}
    YTDLP_VERSION: ${YTDLP_VERSION:-latest}

x-application-security: &application-security
  user: "${APP_UID:-10001}:${APP_GID:-10001}"
  init: true
  extra_hosts:
    - "host.docker.internal:host-gateway"
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-internal-environment: &internal-environment
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID must be set}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY must be set}
  S3_BUCKET: ${S3_BUCKET:-videoroll}
  S3_REGION_NAME: ${S3_REGION_NAME:-us-east-1}
  S3_USE_SSL: ${S3_USE_SSL:-false}
  DEVELOPMENT_MODE: ${DEVELOPMENT_MODE:-false}
  INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set}
  ADMIN_BOOTSTRAP_SECRET: ${ADMIN_BOOTSTRAP_SECRET:?ADMIN_BOOTSTRAP_SECRET must be set}
  CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
  EGRESS_GATEWAY_URL: http://egress-gateway:8020
  ORCHESTRATOR_URL: http://orchestrator:8000

x-subtitle-environment: &subtitle-environment
  <<: *internal-environment
  SUBTITLE_ASR_ENGINE: ${SUBTITLE_ASR_ENGINE:-faster-whisper}
  SUBTITLE_WHISPER_MODEL: ${SUBTITLE_WHISPER_MODEL:-tiny}
  SUBTITLE_WHISPER_DEVICE: ${SUBTITLE_WHISPER_DEVICE:-cpu}
  SUBTITLE_WHISPER_COMPUTE_TYPE: ${SUBTITLE_WHISPER_COMPUTE_TYPE:-int8}
  SUBTITLE_WHISPER_MODEL_DIR: ${SUBTITLE_WHISPER_MODEL_DIR:-/models/whisper}
  SUBTITLE_OPENVINO_MODEL: ${SUBTITLE_OPENVINO_MODEL:-}
  SUBTITLE_OPENVINO_DEVICE: ${SUBTITLE_OPENVINO_DEVICE:-GPU}
  SUBTITLE_OPENVINO_NUM_BEAMS: ${SUBTITLE_OPENVINO_NUM_BEAMS:-1}
  SUBTITLE_OPENVINO_MAX_NEW_TOKENS: ${SUBTITLE_OPENVINO_MAX_NEW_TOKENS:-448}
  FFMPEG_PATH: ${FFMPEG_PATH:-ffmpeg}
  WORK_DIR: ${WORK_DIR:-/work/videoroll}
  YOUTUBE_USER_AGENT: "${YOUTUBE_USER_AGENT:-Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36}"
  YOUTUBE_COOKIE_FILE: ${YOUTUBE_COOKIE_FILE:-}
  YOUTUBE_PROXY: ${YOUTUBE_PROXY:-}
  YOUTUBE_EXTRACTOR_ARGS_JSON: ${YOUTUBE_EXTRACTOR_ARGS_JSON:-}
  TASK_QUEUE_TICK_INTERVAL_SECONDS: ${TASK_QUEUE_TICK_INTERVAL_SECONDS:-10}
  INTEL_GPU_RENDER_DEVICE: ${INTEL_GPU_RENDER_DEVICE:-/dev/dri/renderD128}

x-social-publisher-environment: &social-publisher-environment
  <<: *internal-environment
  SOCIAL_PUBLISH_WORK_DIR: ${SOCIAL_PUBLISH_WORK_DIR:-/work/social-publisher}
  SAU_EXECUTABLE: ${SAU_EXECUTABLE:-sau}
  SAU_RUNTIME_DIR: ${SAU_RUNTIME_DIR:-/opt/social-auto-upload}
  SAU_COOKIES_DIR: ${SAU_COOKIES_DIR:-/opt/social-auto-upload/cookies}
  SAU_HEADLESS: ${SAU_HEADLESS:-true}
  DOUYIN_COOKIE_AUTH_HEADLESS: ${DOUYIN_COOKIE_AUTH_HEADLESS:-true}
  SAU_ACCOUNT_CHECK_TIMEOUT_SECONDS: ${SAU_ACCOUNT_CHECK_TIMEOUT_SECONDS:-120}
  SAU_UPLOAD_TIMEOUT_SECONDS: ${SAU_UPLOAD_TIMEOUT_SECONDS:-3600}
  SAU_OUTPUT_MAX_BYTES: ${SAU_OUTPUT_MAX_BYTES:-65536}
  SAU_LOCK_MARGIN_SECONDS: ${SAU_LOCK_MARGIN_SECONDS:-600}
  SOCIAL_LOGIN_TIMEOUT_SECONDS: ${SOCIAL_LOGIN_TIMEOUT_SECONDS:-900}
  SOCIAL_LOGIN_DISPLAY: ${SOCIAL_LOGIN_DISPLAY:-:99}

services:
  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID must be set}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY must be set}
    volumes:
      - ./data/minio:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: >
      -c "until mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID must be set} ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY must be set}; do
      echo 'waiting for minio...'; sleep 1; done && mc mb -p local/${S3_BUCKET:-videoroll} || true"
    networks: [internal]
    restart: "no"

  egress-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_ASR: "0"
        YTDLP_VERSION: ${YTDLP_VERSION:-latest}
    image: videoroll-egress:prod
    <<: *application-security
    command: ["uvicorn", "videoroll.apps.egress_gateway.main:app", "--host", "0.0.0.0", "--port", "8020"]
    environment:
      DEPLOYMENT_ROLE: egress-gateway
      DEVELOPMENT_MODE: ${DEVELOPMENT_MODE:-false}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set}
      ADMIN_BOOTSTRAP_SECRET: ${ADMIN_BOOTSTRAP_SECRET:?ADMIN_BOOTSTRAP_SECRET must be set}
    networks: [internal, egress]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8020/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  orchestrator:
    build: *application-build
    image: videoroll:prod
    <<: *application-security
    command: ["uvicorn", "videoroll.apps.orchestrator_api.main:app", "--host", "0.0.0.0", "--port", "8000", "--root-path", "/api"]
    environment:
      <<: *internal-environment
      DEPLOYMENT_ROLE: orchestrator
      SUBTITLE_SERVICE_URL: http://subtitle-service:8001
      YOUTUBE_INGEST_URL: http://youtube-ingest:8002
      BILIBILI_PUBLISHER_URL: http://bilibili-publisher:8003
      SOCIAL_PUBLISHER_URL: http://social-publisher-api:8010
      WORK_DIR: ${WORK_DIR:-/work/videoroll}
      FFMPEG_PATH: ${FFMPEG_PATH:-ffmpeg}
      YOUTUBE_USER_AGENT: "${YOUTUBE_USER_AGENT:-Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36}"
      YOUTUBE_COOKIE_FILE: ${YOUTUBE_COOKIE_FILE:-}
      YOUTUBE_PROXY: ${YOUTUBE_PROXY:-}
      YOUTUBE_EXTRACTOR_ARGS_JSON: ${YOUTUBE_EXTRACTOR_ARGS_JSON:-}
      STORAGE_CLEANUP_INTERVAL_SECONDS: ${STORAGE_CLEANUP_INTERVAL_SECONDS:-3600}
    volumes:
      - ./data/secrets:/secrets
      - ./data/work:/work
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      egress-gateway:
        condition: service_healthy
      subtitle-service:
        condition: service_healthy
      youtube-ingest:
        condition: service_healthy
      bilibili-publisher:
        condition: service_healthy
      social-publisher-api:
        condition: service_healthy
    networks:
      internal:
        aliases: [app]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  subtitle-service:
    build: *application-build
    image: videoroll:prod
    <<: *application-security
    command: ["uvicorn", "videoroll.apps.subtitle_service.main:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      <<: *subtitle-environment
      DEPLOYMENT_ROLE: subtitle-api
    volumes:
      - ./data/models:/models
      - ./data/secrets:/secrets
      - ./data/work:/work
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      egress-gateway:
        condition: service_healthy
    networks: [internal]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  youtube-ingest:
    build: *application-build
    image: videoroll:prod
    <<: *application-security
    command: ["uvicorn", "videoroll.apps.youtube_ingest.main:app", "--host", "0.0.0.0", "--port", "8002"]
    environment:
      <<: *internal-environment
      DEPLOYMENT_ROLE: youtube-ingest-api
      YOUTUBE_USER_AGENT: "${YOUTUBE_USER_AGENT:-Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36}"
      YOUTUBE_PROXY: ${YOUTUBE_PROXY:-}
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [internal]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  bilibili-publisher:
    build: *application-build
    image: videoroll:prod
    <<: *application-security
    command: ["uvicorn", "videoroll.apps.bilibili_publisher.main:app", "--host", "0.0.0.0", "--port", "8003"]
    environment:
      <<: *internal-environment
      DEPLOYMENT_ROLE: bilibili-publisher-api
      BILIBILI_PUBLISH_MODE: ${BILIBILI_PUBLISH_MODE:-web}
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [internal]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  subtitle-worker:
    build: *application-build
    image: videoroll:prod
    <<: *application-security
    command: ["sh", "-c", "celery -A videoroll.apps.subtitle_service.worker:celery_app worker -Q subtitle -l INFO --concurrency $$(CELERY_SUB_CONCURRENCY_FALLBACK=\"$${CELERY_SUB_CONCURRENCY_FALLBACK:-1}\" python -m videoroll.apps.subtitle_service.worker_concurrency)"]
    environment:
      <<: *subtitle-environment
      DEPLOYMENT_ROLE: subtitle-worker
      CELERY_SUB_CONCURRENCY_FALLBACK: ${CELERY_SUB_CONCURRENCY_FALLBACK:-1}
    volumes:
      - ./data/models:/models
      - ./data/secrets:/secrets
      - ./data/work:/work
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      egress-gateway:
        condition: service_healthy
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "celery -A videoroll.apps.subtitle_service.worker:celery_app inspect ping --timeout=3 --destination=celery@$${HOSTNAME} | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  outbox-dispatcher:
    build: *application-build
    image: videoroll:prod
    <<: *application-security
    command: ["outbox-dispatcher"]
    environment:
      <<: *subtitle-environment
      DEPLOYMENT_ROLE: outbox-dispatcher
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      subtitle-worker:
        condition: service_healthy
      publish-worker:
        condition: service_healthy
      social-publisher-worker:
        condition: service_healthy
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/outbox-dispatcher-ready"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  publish-worker:
    build: *application-build
    image: videoroll:prod
    <<: *application-security
    command: ["celery", "-A", "videoroll.apps.bilibili_publisher.worker:celery_app", "worker", "-Q", "publish", "-l", "INFO", "--concurrency", "${CELERY_PUB_CONCURRENCY:-1}"]
    environment:
      <<: *internal-environment
      DEPLOYMENT_ROLE: publish-worker
      BILIBILI_PUBLISH_MODE: ${BILIBILI_PUBLISH_MODE:-web}
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "celery -A videoroll.apps.bilibili_publisher.worker:celery_app inspect ping --timeout=3 --destination=celery@$${HOSTNAME} | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  social-publisher-api:
    build:
      context: .
      dockerfile: docker/social-publisher.Dockerfile
    image: videoroll-social-publisher:prod
    <<: *application-security
    command: ["uvicorn", "videoroll.apps.social_publisher.main:app", "--host", "0.0.0.0", "--port", "8010"]
    environment:
      <<: *social-publisher-environment
      DEPLOYMENT_ROLE: social-publisher-api
    volumes:
      - ./data/secrets:/secrets
      - ./data/social-publisher:/work/social-publisher
    tmpfs:
      - /opt/social-auto-upload/cookies:mode=0700,uid=${APP_UID:-10001},gid=${APP_GID:-10001}
      - /dev/shm:mode=1777
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [internal]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  social-publisher-worker:
    build:
      context: .
      dockerfile: docker/social-publisher.Dockerfile
    image: videoroll-social-publisher:prod
    <<: *application-security
    command: ["celery", "-A", "videoroll.apps.social_publisher.worker:celery_app", "worker", "-Q", "social_publish", "-l", "INFO", "--concurrency", "${SOCIAL_PUBLISH_CONCURRENCY:-1}"]
    environment:
      <<: *social-publisher-environment
      DEPLOYMENT_ROLE: social-publisher-worker
    volumes:
      - ./data/secrets:/secrets
      - ./data/social-publisher:/work/social-publisher
    tmpfs:
      - /opt/social-auto-upload/cookies:mode=0700,uid=${APP_UID:-10001},gid=${APP_GID:-10001}
      - /dev/shm:mode=1777
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "celery -A videoroll.apps.social_publisher.worker:celery_app inspect ping --timeout=3 --destination=celery@$${HOSTNAME} | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  social-publisher-scheduler:
    build:
      context: .
      dockerfile: docker/social-publisher.Dockerfile
    image: videoroll-social-publisher:prod
    <<: *application-security
    command: ["celery", "-A", "videoroll.apps.social_publisher.worker:celery_app", "beat", "-l", "INFO", "--schedule", "/tmp/social-celerybeat-schedule"]
    environment:
      <<: *social-publisher-environment
      DEPLOYMENT_ROLE: social-publisher-scheduler
    volumes:
      - ./data/secrets:/secrets
    depends_on:
      redis:
        condition: service_healthy
      social-publisher-worker:
        condition: service_healthy
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "test -e /tmp/social-celerybeat-schedule"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: ./src/web
      args:
        VITE_ORCHESTRATOR_URL: ${VITE_ORCHESTRATOR_URL:-}
    image: videoroll-web:prod
    ports:
      - "${PUBLISH_ADDR:-127.0.0.1}:${WEB_PORT:-3000}:80"
    networks: [internal]
    depends_on:
      orchestrator:
        condition: service_healthy
      social-publisher-api:
        condition: service_healthy
      social-publisher-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  internal:
  egress:
