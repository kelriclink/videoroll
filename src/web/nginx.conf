server {
  listen 80;
  server_name _;

  # Allow large uploads (raw video / cover).
  client_max_body_size 8g;

  # Reverse-proxy API to the backend container so the Web UI can use same-origin
  # requests (avoids CORS / port mismatch issues in production).
  location = /api {
    return 301 /api/;
  }

  location /api/ {
    proxy_pass http://app:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
  }

  # Temporary interactive browser used for social-platform login and verification.
  location /social-login/ {
    proxy_pass http://social-publisher-api:6080/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
  }

  # Live desktop of the Celery worker while a headed Douyin publish is running.
  location /social-publish/ {
    proxy_pass http://social-publisher-worker:6080/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
  }

  # Keep API docs under /api/* to avoid clashing with SPA routes.
  location = /openapi.json { return 301 /api/openapi.json; }
  location ^~ /docs { return 301 /api$request_uri; }
  location ^~ /redoc { return 301 /api$request_uri; }

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
