server {
  listen 80;
  server_name _;

  # Allow large uploads (raw video / cover).
  client_max_body_size 8g;

  # Reverse-proxy API to the backend container so the Web UI can use same-origin
  # requests (avoids CORS / port mismatch issues in production).
  location = /api {
    return 301 /api/;
  }

  # Only the internal auth subrequest may reach this endpoint.  Keep an
  # authenticated browser from calling the authorization adapter directly.
  location = /api/desktop/authorize {
    return 404;
  }

  location /api/ws/ {
    proxy_pass http://app:8000/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    # Preserve the browser port for the orchestrator's WebSocket Origin check.
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
    access_log off;
  }

  location /api/ {
    proxy_pass http://app:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
  }

  # Nginx makes this subrequest before the grant-scoped noVNC landing page and
  # WebSocket request.
  # The original URI retains the scoped grant and resource query parameters;
  # forwarding them as a header avoids sending either to the orchestrator URL
  # or its access logs.
  location = /internal/desktop-auth {
    internal;
    # The landing page establishes a path-scoped, HttpOnly copy of the
    # short-lived grant.  noVNC static asset URLs do not retain query strings,
    # but they must still pass the same grant authorization check.
    set $desktop_grant $arg_grant;
    set $desktop_resource $arg_resource;
    if ($desktop_grant = "") { set $desktop_grant $cookie_videoroll_desktop_grant; }
    if ($desktop_resource = "") { set $desktop_resource $cookie_videoroll_desktop_resource; }
    proxy_pass http://app:8000/desktop/authorize;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Desktop-Grant $desktop_grant;
    proxy_set_header X-Desktop-Resource $desktop_resource;
  }

  # The landing page stores the short-lived grant in an HttpOnly cookie scoped
  # to one desktop path.  Every subsequent noVNC asset and WebSocket request
  # still passes through the same Nginx auth subrequest and database scope check.
  location = /social-login/vnc.html {
    auth_request /internal/desktop-auth;
    add_header Set-Cookie "videoroll_desktop_grant=$arg_grant; Path=/social-login/; Max-Age=300; HttpOnly; SameSite=Strict" always;
    add_header Set-Cookie "videoroll_desktop_resource=$arg_resource; Path=/social-login/; Max-Age=300; HttpOnly; SameSite=Strict" always;
    proxy_pass http://social-publisher-api:6080/vnc.html;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
    # Desktop URLs contain a short-lived grant; do not place it in access logs.
    access_log off;
  }

  location = /social-login/websockify {
    auth_request /internal/desktop-auth;
    proxy_pass http://social-publisher-api:6080/websockify;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
    # Desktop URLs contain a short-lived grant; do not place it in access logs.
    access_log off;
  }

  location /social-login/ {
    auth_request /internal/desktop-auth;
    proxy_pass http://social-publisher-api:6080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
    access_log off;
  }

  # Live desktop of the Celery worker while a headed Douyin publish is running.
  location = /social-publish/vnc.html {
    auth_request /internal/desktop-auth;
    add_header Set-Cookie "videoroll_desktop_grant=$arg_grant; Path=/social-publish/; Max-Age=300; HttpOnly; SameSite=Strict" always;
    add_header Set-Cookie "videoroll_desktop_resource=$arg_resource; Path=/social-publish/; Max-Age=300; HttpOnly; SameSite=Strict" always;
    proxy_pass http://social-publisher-worker:6080/vnc.html;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
    # Desktop URLs contain a short-lived grant; do not place it in access logs.
    access_log off;
  }

  location = /social-publish/websockify {
    auth_request /internal/desktop-auth;
    proxy_pass http://social-publisher-worker:6080/websockify;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
    # Desktop URLs contain a short-lived grant; do not place it in access logs.
    access_log off;
  }

  location /social-publish/ {
    auth_request /internal/desktop-auth;
    proxy_pass http://social-publisher-worker:6080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
    access_log off;
  }

  # Keep API docs under /api/* to avoid clashing with SPA routes.
  location = /openapi.json { return 301 /api/openapi.json; }
  location ^~ /docs { return 301 /api$request_uri; }
  location ^~ /redoc { return 301 /api$request_uri; }

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
